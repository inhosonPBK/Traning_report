name: Weekly DB Backup

on:
  schedule:
    # 매주 일요일 15:00 UTC = 월요일 00:00 KST
    - cron: '0 15 * * 0'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Set backup date
        run: echo "DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Export tables as CSV (REST API)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          export_csv() {
            local table=$1
            curl -sf "$SUPABASE_URL/rest/v1/$table?select=*" \
              -H "apikey: $SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SERVICE_ROLE_KEY" \
              -H "Accept: text/csv" \
              -o "$table.csv"
            echo "✅ $table: $(( $(wc -l < $table.csv) - 1 )) rows"
          }
          export_csv profiles
          export_csv reports
          export_csv interview_reports

      - name: Package into zip
        run: |
          zip "db-backup-${{ env.DATE }}.zip" \
            profiles.csv \
            reports.csv \
            interview_reports.csv
          echo "📦 Zip size: $(du -sh db-backup-${{ env.DATE }}.zip | cut -f1)"

      - name: Upload artifact (90 days retention)
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ env.DATE }}
          path: db-backup-${{ env.DATE }}.zip
          retention-days: 90

      - name: Job summary
        run: |
          PROFILES=$(( $(wc -l < profiles.csv) - 1 ))
          REPORTS=$(( $(wc -l < reports.csv) - 1 ))
          INTERVIEWS=$(( $(wc -l < interview_reports.csv) - 1 ))
          ZIP_SIZE=$(du -sh "db-backup-${{ env.DATE }}.zip" | cut -f1)

          echo "## DB Backup — ${{ env.DATE }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Table | Rows |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| profiles | ${PROFILES} |" >> $GITHUB_STEP_SUMMARY
          echo "| reports | ${REPORTS} |" >> $GITHUB_STEP_SUMMARY
          echo "| interview_reports | ${INTERVIEWS} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact:** \`db-backup-${{ env.DATE }}.zip\` (${ZIP_SIZE})" >> $GITHUB_STEP_SUMMARY
          echo "**Retention:** 90 days" >> $GITHUB_STEP_SUMMARY
